<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Role Selection - Kattral Academy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "secondary": "#855300",
                "secondary-container": "#fea619",
                "surface-variant": "#d3e4fe",
                "inverse-primary": "#c3c0ff",
                "on-secondary-fixed-variant": "#653e00",
                "tertiary": "#41485e",
                "on-primary-container": "#dad7ff",
                "on-tertiary-container": "#d4dbf5",
                "on-secondary-container": "#684000",
                "surface-container-highest": "#d3e4fe",
                "surface-dim": "#cbdbf5",
                "tertiary-fixed-dim": "#bec6e0",
                "on-primary-fixed": "#0f0069",
                "on-primary": "#ffffff",
                "primary-fixed-dim": "#c3c0ff",
                "on-surface": "#0b1c30",
                "on-primary-fixed-variant": "#3323cc",
                "secondary-fixed": "#ffddb8",
                "outline": "#777587",
                "on-error-container": "#93000a",
                "surface-container-low": "#eff4ff",
                "surface-container": "#e5eeff",
                "on-secondary": "#ffffff",
                "error-container": "#ffdad6",
                "on-secondary-fixed": "#2a1700",
                "on-tertiary-fixed-variant": "#3f465c",
                "primary-container": "#4f46e5",
                "surface-container-lowest": "#ffffff",
                "inverse-surface": "#213145",
                "primary": "#3525cd",
                "surface-tint": "#4d44e3",
                "outline-variant": "#c7c4d8",
                "surface": "#f8f9ff",
                "on-error": "#ffffff",
                "secondary-fixed-dim": "#ffb95f",
                "inverse-on-surface": "#eaf1ff",
                "primary-fixed": "#e2dfff",
                "tertiary-fixed": "#dae2fd",
                "background": "#f8f9ff",
                "on-tertiary": "#ffffff",
                "on-background": "#0b1c30",
                "error": "#ba1a1a",
                "tertiary-container": "#586076",
                "on-surface-variant": "#464555",
                "surface-container-high": "#dce9ff",
                "on-tertiary-fixed": "#131b2e",
                "surface-bright": "#f8f9ff"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "margin-mobile": "16px",
                "gutter": "24px",
                "sidebar-width": "280px",
                "section-gap": "64px",
                "margin-desktop": "32px",
                "container-max": "1280px"
        },
        "fontFamily": {
                "body-md": ["Inter"],
                "label-md": ["Inter"],
                "headline-md": ["Inter"],
                "body-lg": ["Inter"],
                "label-sm": ["Inter"],
                "headline-lg": ["Inter"],
                "headline-xl": ["Inter"],
                "display-lg-mobile": ["Inter"],
                "body-sm": ["Inter"],
                "display-lg": ["Inter"]
        },
        "fontSize": {
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
  }
  
  /* Background grid pattern for the body to give a subtle textured look */
  .bg-grid-pattern {
    background-size: 40px 40px;
    background-image: linear-gradient(to right, rgba(119, 117, 135, 0.05) 1px, transparent 1px),
                      linear-gradient(to bottom, rgba(119, 117, 135, 0.05) 1px, transparent 1px);
  }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-grid-pattern antialiased">
<!-- Main Centered Transactional Card -->
<main class="w-full max-w-4xl bg-inverse-surface text-inverse-on-surface rounded-2xl md:rounded-[2rem] shadow-2xl p-8 md:p-16 relative overflow-hidden">
<!-- Decorative background glow within the dark card -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full max-w-2xl bg-primary/10 blur-[100px] rounded-full pointer-events-none"></div>
<!-- Header Section -->
<div class="text-center mb-12 relative z-10">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg mb-4">
        What's your role?
      </h1>
<p class="font-body-lg text-body-lg text-outline-variant max-w-lg mx-auto">
        Select how you'll be using Kattral Academy to personalize your dashboard and tools.
      </p>
</div>
<!-- Role Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
<!-- Teacher Card -->
<button class="group flex flex-col items-center text-center p-8 md:p-10 rounded-2xl border border-outline-variant/20 bg-white/5 hover:bg-white/10 hover:border-primary-fixed-dim/50 transition-all duration-300 transform hover:scale-[1.02] focus:outline-none focus:ring-4 focus:ring-primary/30">
<div class="w-20 h-20 rounded-full bg-primary/20 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[40px] text-primary-fixed-dim">
            school
          </span>
</div>
<h2 class="font-headline-xl text-headline-xl mb-3">Teacher</h2>
<p class="font-body-md text-body-md text-outline-variant">
          Create classrooms, manage curriculum, host live sessions, and track student analytics.
        </p>
<div class="mt-8 flex items-center justify-center space-x-2 text-primary-fixed-dim opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="font-label-md text-label-md">Select Teacher</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</div>
</button>
<!-- Student Card -->
<!-- Note: Theme lacks a bright green, using secondary-fixed (amber/orange) to contrast nicely against the dark surface and blue icon -->
<button class="group flex flex-col items-center text-center p-8 md:p-10 rounded-2xl border border-outline-variant/20 bg-white/5 hover:bg-white/10 hover:border-secondary-fixed-dim/50 transition-all duration-300 transform hover:scale-[1.02] focus:outline-none focus:ring-4 focus:ring-secondary/30">
<div class="w-20 h-20 rounded-full bg-secondary-fixed/20 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[40px] text-secondary-fixed">
            face
          </span>
</div>
<h2 class="font-headline-xl text-headline-xl mb-3">Student</h2>
<p class="font-body-md text-body-md text-outline-variant">
          Join classrooms, access course materials, submit assignments, and view your progress.
        </p>
<div class="mt-8 flex items-center justify-center space-x-2 text-secondary-fixed opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="font-label-md text-label-md">Select Student</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</div>
</button>
</div>
<!-- Footer Link -->
<div class="mt-12 text-center relative z-10">
<p class="font-body-sm text-body-sm text-outline-variant">
        Already have an account? 
        <a class="text-primary-fixed-dim hover:text-primary-fixed underline decoration-transparent hover:decoration-primary-fixed transition-colors" href="#">Sign in</a>
</p>
</div>
</main>
</body></html>
