<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Role Selection - Kattral Academy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "tertiary-fixed-dim": "#bec6e0",
                "on-tertiary-container": "#d4dbf5",
                "error-container": "#ffdad6",
                "surface-variant": "#d3e4fe",
                "inverse-surface": "#213145",
                "on-primary": "#ffffff",
                "background": "#f8f9ff",
                "on-tertiary-fixed": "#131b2e",
                "surface-container": "#e5eeff",
                "secondary-container": "#fea619",
                "on-error": "#ffffff",
                "primary": "#3525cd",
                "on-secondary-container": "#684000",
                "on-secondary": "#ffffff",
                "primary-container": "#4f46e5",
                "on-primary-container": "#dad7ff",
                "outline": "#777587",
                "on-surface": "#0b1c30",
                "surface-container-high": "#dce9ff",
                "secondary-fixed-dim": "#ffb95f",
                "error": "#ba1a1a",
                "surface": "#f8f9ff",
                "secondary-fixed": "#ffddb8",
                "on-secondary-fixed": "#2a1700",
                "on-error-container": "#93000a",
                "inverse-primary": "#c3c0ff",
                "inverse-on-surface": "#eaf1ff",
                "surface-tint": "#4d44e3",
                "surface-dim": "#cbdbf5",
                "primary-fixed": "#e2dfff",
                "surface-container-highest": "#d3e4fe",
                "on-secondary-fixed-variant": "#653e00",
                "on-primary-fixed": "#0f0069",
                "tertiary-container": "#586076",
                "on-background": "#0b1c30",
                "tertiary-fixed": "#dae2fd",
                "on-primary-fixed-variant": "#3323cc",
                "surface-container-low": "#eff4ff",
                "on-surface-variant": "#464555",
                "outline-variant": "#c7c4d8",
                "secondary": "#855300",
                "primary-fixed-dim": "#c3c0ff",
                "on-tertiary-fixed-variant": "#3f465c",
                "surface-bright": "#f8f9ff",
                "tertiary": "#41485e",
                "on-tertiary": "#ffffff",
                "surface-container-lowest": "#ffffff"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "margin-mobile": "16px",
                "gutter": "24px",
                "section-gap": "64px",
                "margin-desktop": "32px",
                "container-max": "1280px",
                "sidebar-width": "280px"
        },
        "fontFamily": {
                "display-lg": ["Inter"],
                "body-lg": ["Inter"],
                "label-sm": ["Inter"],
                "headline-xl": ["Inter"],
                "headline-md": ["Inter"],

                "body-md": ["Inter"],
                "display-lg-mobile": ["Inter"],
                "label-md": ["Inter"],
                "body-sm": ["Inter"]
        },
        "fontSize": {

                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

                "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]

      }

<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
  }
</style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
<main class="w-full max-w-5xl relative z-10">
<!-- Decorative subtle background glows -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-amber-600/10 blur-[120px] rounded-full"></div>
</div>
<!-- Header Section -->
<div class="text-center mb-16 relative z-10">
<h1 class="font-display-lg-mobile md:font-display-lg mb-4 text-white">
        What's your role?
      </h1>
<p class="font-body-lg text-slate-300 max-w-2xl mx-auto">
        Select how you'll be using Kattral Academy to personalize your dashboard and tools.
      </p>
</div>
<!-- Role Selection Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
<!-- Teacher Card -->
<button class="group flex flex-col items-center text-center p-10 md:p-12 rounded-[2rem] border border-white/10 bg-white/5 backdrop-blur-sm hover:bg-white/10 hover:border-indigo-400/50 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_0_40px_-10px_rgba(99,102,241,0.3)] focus:outline-none focus:ring-4 focus:ring-indigo-500/30 w-full relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-indigo-500/0 to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
<div class="w-24 h-24 rounded-full bg-indigo-500/20 flex items-center justify-center mb-8 group-hover:scale-110 transition-transform duration-300 group-hover:bg-indigo-500/30">
<span class="material-symbols-outlined text-[56px] text-indigo-400">
            school
          </span>
</div>
<h2 class="font-headline-xl text-white mb-4">Teacher</h2>
<p class="font-body-md text-slate-300 max-w-sm">
          Create classrooms, manage curriculum, host live sessions, and track student analytics.
        </p>
<div class="mt-8 flex items-center justify-center space-x-2 text-indigo-400 opacity-0 transform translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">
<span class="font-label-md">Continue as Teacher</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</div>
</button>
<!-- Student Card -->
<button class="group flex flex-col items-center text-center p-10 md:p-12 rounded-[2rem] border border-white/10 bg-white/5 backdrop-blur-sm hover:bg-white/10 hover:border-amber-400/50 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_0_40px_-10px_rgba(251,191,36,0.2)] focus:outline-none focus:ring-4 focus:ring-amber-500/30 w-full relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-amber-500/0 to-amber-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
<div class="w-24 h-24 rounded-full bg-amber-500/20 flex items-center justify-center mb-8 group-hover:scale-110 transition-transform duration-300 group-hover:bg-amber-500/30">
<span class="material-symbols-outlined text-[56px] text-amber-400">
            menu_book
          </span>
</div>
<h2 class="font-headline-xl text-white mb-4">Student</h2>
<p class="font-body-md text-slate-300 max-w-sm">
          Join classrooms, access course materials, submit assignments, and view your progress.
        </p>
<div class="mt-8 flex items-center justify-center space-x-2 text-amber-400 opacity-0 transform translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-300">
<span class="font-label-md">Continue as Student</span>
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</div>
</button>
</div>
<!-- Footer Link -->
<div class="mt-16 text-center relative z-10">
<p class="font-body-sm text-slate-400">
        Already have an account? 
        <a class="text-white hover:text-indigo-300 underline decoration-transparent hover:decoration-indigo-300 transition-colors font-medium" href="#">Sign in</a>
</p>
</div>
</main>
</body></html>
